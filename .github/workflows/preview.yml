name: Preview Build & Deploy

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.set_commit.outputs.commit_count }}
      build_time: ${{ steps.set_commit.outputs.build_time }}
      universal_size: ${{ steps.set_commit.outputs.universal_size }}
      arm64-v8a_size: ${{ steps.set_commit.outputs.arm64-v8a_size }}
      armeabi-v7a_size: ${{ steps.set_commit.outputs.armeabi-v7a_size }}
      x86_size: ${{ steps.set_commit.outputs.x86_size }}
      x86_64_size: ${{ steps.set_commit.outputs.x86_64_size }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assemblePreview

      - name: Sign APKs
        run: |
          set -e
          RELEASE_DIR="app/build/outputs/apk/preview"
          
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 -d > release.keystore
          
          # Find all unsigned APKs
          APK_COUNT=$(find "$RELEASE_DIR" -name "app-*-preview-unsigned.apk" -type f | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "No unsigned APK files found"
            ls -lah "$RELEASE_DIR"
            rm release.keystore
            exit 1
          fi
          
          find "$RELEASE_DIR" -name "app-*-preview-unsigned.apk" -type f | while read -r apk; do
            # Rename output to remove -unsigned suffix
            signed_apk="${apk/-unsigned/}"
          
            $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
              --ks release.keystore \
              --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
              --ks-pass "pass:${{ secrets.SIGNING_STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out "$signed_apk" \
              "$apk"
          
            $ANDROID_HOME/build-tools/35.0.0/apksigner verify "$signed_apk"
            rm "$apk"
          done
          
          rm release.keystore
          ls -lh "$RELEASE_DIR"/app-*-preview.apk

      - name: Copy build artifacts
        id: set_commit
        run: |
          set -e
          commit_count=$(git rev-list --count HEAD)
          build_time=$(date -u +"%Y-%m-%d %H:%M UTC")
          echo "commit_count=$commit_count" >> $GITHUB_OUTPUT
          echo "build_time=$build_time" >> $GITHUB_OUTPUT

          declare -a apks=("universal" "arm64-v8a" "armeabi-v7a" "x86" "x86_64")
          mkdir -p output
          
          for arch in "${apks[@]}"; do
            src="app/build/outputs/apk/preview/app-${arch}-preview.apk"
            dest="output/mpvRex-preview-r${commit_count}-${arch}.apk"
            
            if [ ! -f "$src" ]; then
              echo "::error file=$src::Signed APK for $arch was not found"
              exit 1
            fi
            
            cp "$src" "$dest"
          
            # Get file size in human-readable format
            size=$(du -h "$dest" | cut -f1)
            echo "${arch}_size=$size" >> $GITHUB_OUTPUT
          done

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: preview-apks
          path: output/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: preview-apks
          path: ./public

      - name: Generate download page
        run: |
          export COMMIT_COUNT=${{ needs.build.outputs.commit_count }}
          export BUILD_TIME="${{ needs.build.outputs.build_time }}"
          export UNIVERSAL_SIZE="${{ needs.build.outputs.universal_size }}"
          export ARM64_SIZE="${{ needs.build.outputs.arm64-v8a_size }}"
          export ARMV7_SIZE="${{ needs.build.outputs.armeabi-v7a_size }}"
          export X86_SIZE="${{ needs.build.outputs.x86_size }}"
          export X86_64_SIZE="${{ needs.build.outputs.x86_64_size }}"
          
          envsubst < .github/workflows/preview.template.html > ./public/index.html


      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4